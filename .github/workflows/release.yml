name: Release

'on':
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross for ARM builds
        if: matrix.use_cross == true
        run: |
          cargo install cross --locked --git https://github.com/cross-rs/cross 2>&1 | grep -v "already installed" || true

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Free up disk space
        if: matrix.os == 'ubuntu-latest'
        run: |
          df -h
          sudo apt-get clean -y
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Build binary (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} -j 3
        env:
          CARGO_BUILD_JOBS: 3
          RUSTFLAGS: -C link-arg=-fuse-ld=lld

      - name: Build binary (macOS)
        if: matrix.os == 'macos-latest' && matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} -j 3
        env:
          CARGO_BUILD_JOBS: 3

      - name: Build binary (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }} -j 3
        env:
          CARGO_BUILD_JOBS: 3

      - name: Set up swap for ARM builds
        if: matrix.use_cross == true && matrix.os == 'ubuntu-latest'
        run: |
          # Disable existing swap if present
          sudo swapoff /swapfile 2>/dev/null || true
          
          # Remove existing swap file if present
          sudo rm -f /swapfile
          
          # Create new swap file
          sudo dd if=/dev/zero of=/swapfile bs=1G count=4
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Build ARM binary with cross
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} -j 2

      - name: Get binary name
        id: binary_name
        shell: bash
        run: |
          BINARY_NAME="git-remote-codecommit"
          echo "binary_name=${BINARY_NAME}" >> $GITHUB_OUTPUT

      - name: Show binary info
        shell: bash
        run: ls -lh target/${{ matrix.target }}/release/${{ steps.binary_name.outputs.binary_name }}${{ matrix.ext }}

      - name: Create archive
        id: archive
        shell: bash
        run: |
          BINARY_NAME="${{ steps.binary_name.outputs.binary_name }}"
          echo "BINARY_NAME=${BINARY_NAME}"
          BINARY_PATH="target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.ext }}"
          echo "BINARY_PATH=${BINARY_PATH}"
          ARCHIVE_NAME="${BINARY_NAME}-${{ matrix.name }}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "Creating Windows archive"
            ARCHIVE_FILE="${ARCHIVE_NAME}.zip"
            echo "Creating archive: ${ARCHIVE_FILE}"
            cd target/${{ matrix.target }}/release
            7z a "../../../${ARCHIVE_FILE}" "${BINARY_NAME}${{ matrix.ext }}"
          else
            ls -ail target/${{ matrix.target }}/release
            echo "Creating non-Windows archive"
            ARCHIVE_FILE="${ARCHIVE_NAME}.tar.gz"
            echo "Creating archive: ${ARCHIVE_FILE}"
            tar -czf "${ARCHIVE_FILE}" -C "target/${{ matrix.target }}/release" "${BINARY_NAME}${{ matrix.ext }}"
          fi

          echo "archive_name=${ARCHIVE_FILE}" >> $GITHUB_OUTPUT
          echo "asset_path=${ARCHIVE_FILE}" >> $GITHUB_OUTPUT

      - name: Generate checksum for asset
        shell: bash
        run: sha256sum ${{ steps.archive.outputs.archive_name }} >> checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-${{ github.ref_name }}
          path: |
            ${{ steps.archive.outputs.archive_name }}
            checksums.txt
          retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p ./flat-assets
          find ./release-assets -type f -exec mv {} ./flat-assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./flat-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}